<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Học Cùng Capybara</title>
    
    <link rel="stylesheet" href="style-tailwind.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-capy-bg text-gray-900 min-h-screen flex flex-col items-center justify-center p-4 antialiased selection:bg-capy-brown selection:text-white">

    <div class="w-full max-w-[420px] bg-white border-none rounded-[40px] shadow-[0_15px_35px_rgba(0,0,0,0.05)] overflow-hidden relative">
        
        <div id="login-view" class="p-8 md:p-10 transition-all duration-300">
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-capy-brown rounded-[25px] flex items-center justify-center shadow-md">
                    <img src="images/capybara.png" alt="Capybara" class="h-12 w-auto fallback-icon">
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold tracking-tight text-gray-900 mb-2">Chào mừng trở lại!</h1>
                <p class="text-sm text-gray-500 italic">Cùng nhau học tập thật "chill" nhé!</p>
            </div>

            <form class="space-y-5" onsubmit="window.location.href='dashboard.html'; return false;">
                <div>
                    <div class="relative">
                        <iconify-icon icon="solar:letter-bold" width="20" height="20" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                        <input type="email" placeholder="Email của bạn" class="w-full bg-capy-input border-none rounded-full pl-12 pr-4 py-3.5 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-capy-brown/30 transition-shadow">
                    </div>
                </div>

                <div>
                    <div class="relative">
                        <iconify-icon icon="solar:lock-password-bold" width="20" height="20" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                        <input type="password" placeholder="Mật khẩu" class="w-full bg-capy-input border-none rounded-full pl-12 pr-10 py-3.5 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-capy-brown/30 transition-shadow">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <iconify-icon icon="solar:eye-linear" width="18" height="18"></iconify-icon>
                        </button>
                    </div>
                    <div class="flex justify-end mt-2">
                        <a href="#" class="text-xs text-gray-500 hover:text-capy-brown transition-colors">Quên mật khẩu?</a>
                    </div>
                </div>

                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-capy-brown text-white rounded-full py-3.5 text-sm font-bold hover:bg-capy-brownHover transition-transform hover:-translate-y-0.5 shadow-md mt-4">
                    Tiếp Tục
                    <iconify-icon icon="solar:arrow-right-linear" width="18" height="18"></iconify-icon>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    Chưa có tài khoản? 
                    <button onclick="toggleView()" class="text-capy-brown font-bold hover:underline underline-offset-2 transition-all">Đăng ký ngay</button>
                </p>
            </div>
        </div>

        <div id="register-view" class="p-8 md:p-10 hidden transition-all duration-300">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-capy-brown rounded-[20px] flex items-center justify-center shadow-md">
                    <img src="images/capybara.png" alt="Capybara" class="h-10 w-auto fallback-icon">
                </div>
            </div>

            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold tracking-tight text-gray-900 mb-2">Tạo tài khoản</h2>
                <p class="text-sm text-gray-500 italic">Bắt đầu lên kế hoạch học tập cùng AI</p>
            </div>

            <form class="space-y-4" onsubmit="window.location.href='dashboard.html'; return false;">
                <div class="relative">
                    <iconify-icon icon="solar:user-rounded-bold" width="20" height="20" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                    <input type="text" placeholder="Tên hiển thị" class="w-full bg-capy-input border-none rounded-full pl-12 pr-4 py-3.5 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-capy-brown/30 transition-shadow">
                </div>

                <div class="relative">
                    <iconify-icon icon="solar:letter-bold" width="20" height="20" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                    <input type="email" placeholder="Email của bạn" class="w-full bg-capy-input border-none rounded-full pl-12 pr-4 py-3.5 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-capy-brown/30 transition-shadow">
                </div>

                <div class="relative">
                    <iconify-icon icon="solar:lock-password-bold" width="20" height="20" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                    <input type="password" placeholder="Mật khẩu (Tối thiểu 8 ký tự)" class="w-full bg-capy-input border-none rounded-full pl-12 pr-4 py-3.5 text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-capy-brown/30 transition-shadow">
                </div>

                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-capy-brown text-white rounded-full py-3.5 text-sm font-bold hover:bg-capy-brownHover transition-transform hover:-translate-y-0.5 shadow-md mt-6">
                    Tạo tài khoản
                    <iconify-icon icon="solar:magic-stick-3-linear" width="18" height="18"></iconify-icon>
                </button>
            </form>

            <div class="mt-8 border-t border-gray-100 pt-6 text-center">
                <p class="text-sm text-gray-500">
                    Đã có tài khoản? 
                    <button onclick="toggleView()" class="text-capy-brown font-bold hover:underline underline-offset-2 transition-all">Đăng nhập</button>
                </p>
            </div>
        </div>
    </div>

    <div class="mt-8 text-center flex items-center justify-center gap-2 text-sm text-gray-400">
        <iconify-icon icon="solar:shield-check-bold" width="18" height="18"></iconify-icon>
        Bảo mật an toàn & mã hóa đầu cuối
    </div>

    <script>
        function toggleView() {
            const loginView = document.getElementById('login-view');
            const registerView = document.getElementById('register-view');
            
            if (loginView.classList.contains('hidden')) {
                loginView.classList.remove('hidden');
                registerView.classList.add('hidden');
            } else {
                loginView.classList.add('hidden');
                registerView.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
